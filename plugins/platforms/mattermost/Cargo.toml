[package]
name = "mattermost-platform"
version = "0.1.0"
edition = "2021"
description = "Mattermost platform plugin for OmniAgent: implements the platform plugin protocol for Mattermost"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", features = ["json"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
chrono = "0.4"
base64 = "0.22"

