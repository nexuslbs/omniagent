services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent -d omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"

  omniagent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://omniagent:omniagent@postgres:5432/omniagent
      QDRANT_URL: http://qdrant:6333
      HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ./data:/opt/data:rw
      - /tmp/data/omni:/tmp/data/omni:rw
    expose:
      - "8080"
    user: root

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    env_file:
      - backup.env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: omniagent
      PGPASSWORD: omniagent
      PGDATABASE: omniagent
    volumes:
      - ./data:/opt/data:rw

volumes:
  postgres_data:
  qdrant_data:
  cargo-registry:
  cargo-git:
