services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: omniagent
      POSTGRES_USER: omniagent
      POSTGRES_PASSWORD: omniagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omniagent -d omniagent"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.18.2
    volumes:
      - qdrant_data:/qdrant/storage
    expose:
      - "6333"

  omniagent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://omniagent:***@postgres:5432/omniagent
      QDRANT_URL: http://qdrant:6333
      HOST: 0.0.0.0
      PORT: 8080
      WORKSPACE_DIR: /opt/workspace
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - ./data:/opt/data:rw
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /opt/workspace/omni-workspace:/opt/workspace:rw
      - /opt/data/credentials:/opt/data/credentials:ro
      - /opt/data/.env:/opt/data/.env:rw
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    user: root
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    env_file:
      - backup.env
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: omniagent
      PGPASSWORD: omniagent
      PGDATABASE: omniagent
    volumes:
      - ./data:/opt/data:rw

volumes:
  postgres_data:
  qdrant_data:
  cargo-registry:
  cargo-git:
